<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
</head>
<body>

<h1>AI Resume Analyzer</h1>

<form method="post" enctype="multipart/form-data">
    <input type="file" name="resume" required>
    <button type="submit">Analyze</button>
</form>

<h3>Skills: {{ skills }}</h3>
<h3>ATS Score: {{ score }}</h3>
<h3>Jobs: {{ jobs }}</h3>

</body>
</html>
